<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XYPHER – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --primary-dark: #5b21b6;
      --bg: #07071a;
      --border: rgba(124,58,237,0.25);
      --text: rgba(240,240,255,0.9);
      --text-muted: rgba(240,240,255,0.45);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    /* Auth gate */
    .auth-gate {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(7,7,26,0.98);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-box {
      background: rgba(15,15,30,0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .auth-box h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.4rem; }
    .auth-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; }

    /* Top Bar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(7,7,26,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.08em;
      color: white; text-decoration: none;
    }
    .logo-dot { width: 9px; height: 9px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px rgba(124,58,237,0.8); }
    .admin-badge {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #fb923c;
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.25);
      border-radius: 6px; padding: 4px 10px;
    }

    /* Main */
    .main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Cards */
    .panel {
      background: rgba(15,15,30,0.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.8rem;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
    }
    .panel-title {
      font-size: 1rem; font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 8px;
    }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
    input[type="text"], input[type="password"], select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      color: white;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--primary); }
    input::placeholder { color: rgba(240,240,255,0.2); }
    select option { background: #1a1a35; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white; border: none;
      border-radius: 10px; padding: 0.8rem 1.6rem;
      font-size: 0.9rem; font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(124,58,237,0.55); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Customers table */
    .customers-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .customer-row {
      display: flex; align-items: center; gap: 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 0.8rem 1rem;
      transition: border-color 0.2s;
    }
    .customer-row:hover { border-color: rgba(124,58,237,0.3); }
    .customer-avatar {
      width: 36px; height: 36px;
      background: rgba(124,58,237,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .customer-info { flex: 1; min-width: 0; }
    .customer-name { font-size: 0.9rem; font-weight: 700; color: white; }
    .customer-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .customer-type {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--primary-light);
      border-radius: 6px; padding: 3px 8px;
    }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 8px; padding: 5px 12px;
      font-size: 0.78rem; font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* Status messages */
    .msg-box {
      border-radius: 10px; padding: 0.7rem 1rem;
      font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .msg-box.show { display: block; }
    .msg-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .msg-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }

    .empty-row { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.88rem; }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <!-- Auth Gate -->
  <div class="auth-gate" id="authGate">
    <div class="auth-box">
      <div style="font-size:2rem;margin-bottom:0.8rem;">🔐</div>
      <h2>Admin-Zugang</h2>
      <p>Bitte Adminpasswort eingeben</p>
      <div class="form-group" style="margin-bottom:1rem;">
        <input type="password" id="adminPwInput" placeholder="Admin-Passwort" onkeydown="if(event.key==='Enter')checkAdmin()" />
      </div>
      <div class="msg-box msg-error" id="authError" style="display:none;text-align:left;">Falsches Passwort.</div>
      <button class="btn-primary" onclick="checkAdmin()" style="width:100%;">Einloggen</button>
    </div>
  </div>

  <!-- Top Bar -->
  <nav class="topbar">
    <a href="/" class="logo"><div class="logo-dot"></div> XYPHER</a>
    <span class="admin-badge">⚙️ Admin Panel</span>
  </nav>

  <!-- Main -->
  <main class="main">

    <!-- Create Customer -->
    <div class="panel">
      <div class="panel-title">➕ Neuen Kunden anlegen</div>

      <div class="msg-box msg-success" id="createSuccess">✅ Kunde erfolgreich angelegt!</div>
      <div class="msg-box msg-error" id="createError">Fehler beim Anlegen.</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Benutzername *</label>
          <input type="text" id="newUsername" placeholder="pizzeria-lolipop" />
        </div>
        <div class="form-group">
          <label>Passwort *</label>
          <input type="password" id="newPassword" placeholder="sicheres Passwort..." />
        </div>
        <div class="form-group">
          <label>Unternehmensname *</label>
          <input type="text" id="newBizName" placeholder="Pizzeria Lolipop" />
        </div>
        <div class="form-group">
          <label>Branche</label>
          <select id="newBizType">
            <option value="Sonstiges">Sonstiges</option>
            <option value="Pizzeria">🍕 Pizzeria</option>
            <option value="Restaurant">🍽️ Restaurant</option>
            <option value="Friseur">💇 Friseur</option>
            <option value="Arztpraxis">🏥 Arztpraxis</option>
            <option value="Autowerkstatt">🚗 Autowerkstatt</option>
            <option value="Fitnessstudio">🏋️ Fitnessstudio</option>
            <option value="Handwerker">🔧 Handwerker</option>
            <option value="Café">☕ Café</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="createCustomer()" id="createBtn">Kunden anlegen</button>
    </div>

    <!-- Customer List -->
    <div class="panel">
      <div class="panel-title">👥 Alle Kunden</div>
      <div id="customersList">
        <div class="empty-row">⏳ Lade Kunden...</div>
      </div>
    </div>

  </main>

  <script>
    const ADMIN_KEY = 'xypher-admin-2026';
    const HARDCODED_PW = 'xypher-admin-2026'; // Same as key for simplicity

    let adminUnlocked = false;

    function checkAdmin() {
      const val = document.getElementById('adminPwInput').value;
      if (val === HARDCODED_PW) {
        adminUnlocked = true;
        document.getElementById('authGate').style.display = 'none';
        loadCustomers();
      } else {
        const err = document.getElementById('authError');
        err.style.display = 'block';
        err.classList.add('show');
      }
    }

    function showMsg(id, show) {
      document.getElementById(id).classList.toggle('show', show);
      document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    async function createCustomer() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const business_name = document.getElementById('newBizName').value.trim();
      const business_type = document.getElementById('newBizType').value;

      showMsg('createSuccess', false);
      showMsg('createError', false);

      if (!username || !password || !business_name) {
        document.getElementById('createError').textContent = 'Bitte alle Pflichtfelder ausfüllen.';
        showMsg('createError', true);
        return;
      }

      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Wird angelegt...';

      try {
        const res = await fetch('/api/admin/customers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': ADMIN_KEY
          },
          body: JSON.stringify({ username, password, business_name, business_type })
        });

        if (res.ok) {
          showMsg('createSuccess', true);
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('newBizName').value = '';
          document.getElementById('newBizType').value = 'Sonstiges';
          loadCustomers();
          setTimeout(() => showMsg('createSuccess', false), 4000);
        } else {
          const data = await res.json();
          document.getElementById('createError').textContent = data.error || 'Fehler beim Anlegen.';
          showMsg('createError', true);
        }
      } catch (e) {
        document.getElementById('createError').textContent = 'Verbindungsfehler.';
        showMsg('createError', true);
      }

      btn.disabled = false;
      btn.textContent = 'Kunden anlegen';
    }

    async function deleteCustomer(id, name) {
      if (!confirm(`Kunde "${name}" wirklich löschen?`)) return;

      try {
        const res = await fetch(`/api/admin/customers/${id}`, {
          method: 'DELETE',
          headers: { 'x-admin-key': ADMIN_KEY }
        });
        if (res.ok) {
          loadCustomers();
        } else {
          alert('Fehler beim Löschen.');
        }
      } catch(e) {
        alert('Verbindungsfehler.');
      }
    }

    const typeEmojis = {
      'Pizzeria': '🍕', 'Restaurant': '🍽️', 'Friseur': '💇',
      'Arztpraxis': '🏥', 'Autowerkstatt': '🚗', 'Fitnessstudio': '🏋️',
      'Handwerker': '🔧', 'Café': '☕', 'Sonstiges': '🏢'
    };

    async function loadCustomers() {
      const container = document.getElementById('customersList');
      try {
        const res = await fetch('/api/admin/customers', {
          headers: { 'x-admin-key': ADMIN_KEY }
        });

        if (!res.ok) throw new Error('Fehler');
        const data = await res.json();
        const customers = data.customers || data || [];

        if (customers.length === 0) {
          container.innerHTML = '<div class="empty-row">Noch keine Kunden angelegt.</div>';
          return;
        }

        container.innerHTML = `<div class="customers-list">` +
          customers.map(c => {
            const emoji = typeEmojis[c.business_type] || '🏢';
            const dateStr = c.created_at ? new Date(c.created_at).toLocaleDateString('de-DE') : '—';
            return `
              <div class="customer-row">
                <div class="customer-avatar">${emoji}</div>
                <div class="customer-info">
                  <div class="customer-name">${escapeHtml(c.business_name)}</div>
                  <div class="customer-meta">@${escapeHtml(c.username)} · Erstellt: ${dateStr}</div>
                </div>
                <span class="customer-type">${escapeHtml(c.business_type || 'Sonstiges')}</span>
                <button class="btn-delete" onclick="deleteCustomer('${c.id}', '${escapeHtml(c.business_name)}')">🗑 Löschen</button>
              </div>`;
          }).join('') +
        `</div>`;
      } catch(e) {
        container.innerHTML = '<div class="empty-row" style="color:#fca5a5;">Fehler beim Laden der Kunden.</div>';
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
