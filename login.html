<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XYPHONE – Login</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Xyphone">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --primary-dark: #5b21b6;
      --bg: #07071a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(124,58,237,0.25);
      --text: rgba(240,240,255,0.9);
      --text-muted: rgba(240,240,255,0.45);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Background effects */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 18s ease-in-out infinite;
    }
    @keyframes floatOrb {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50% { transform: translate(-50%,-52%) scale(1.05); }
    }
    .bg-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22vw;
      font-weight: 900;
      color: rgba(124,58,237,0.04);
      letter-spacing: -0.05em;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
      user-select: none;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(15,15,30,0.85);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(124,58,237,0.2), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: white;
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(124,58,237,0.8);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
      color: white;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(240,240,255,0.6);
      margin-bottom: 0.45rem;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: white;
      font-size: 0.95rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    input::placeholder { color: rgba(240,240,255,0.25); }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(124,58,237,0.4);
      transition: all 0.2s;
      margin-top: 0.5rem;
      letter-spacing: -0.01em;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124,58,237,0.6);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-box.show { display: block; }

    .footer-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="orb"></div>
  <div class="bg-text">XYPHER</div>

  <div class="login-card">
    <a href="/" class="logo">
      <div class="logo-dot"></div> XYPHONE
    </a>

    <h1>Willkommen zurück</h1>
    <p class="subtitle">Melde dich an, um dein Dashboard zu öffnen.</p>

    <div class="error-box" id="errorBox">
      Falscher Benutzername oder Passwort. Bitte erneut versuchen.
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" placeholder="dein-benutzername" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Einloggen</button>
    </form>

    <div class="footer-note">
      Powered by <strong style="color: var(--primary-light);">XYPHER KI</strong>
    </div>
  </div>

  <script>
    // ── Service Worker Registration ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('[SW] Registriert:', reg.scope);
      }).catch(err => {
        console.warn('[SW] Registrierung fehlgeschlagen:', err);
      });
    }
  </script>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('xypher_token')) {
      window.location.href = '/dashboard.html';
    }

    const SUPABASE_URL = 'https://llrnusfadlazswgudxjt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxscm51c2ZhZGxhenN3Z3VkeGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTY2NTMsImV4cCI6MjA5MDczMjY1M30.Ola6RkKMCqfLd05-H23f5M4VhRRJNMk_Xl8E-a-lLRo';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorBox = document.getElementById('errorBox');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = '⏳ Einloggen...';

      try {
        const pwHash = await sha256(password);

        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/clients?username=eq.${encodeURIComponent(username)}&password_hash=eq.${pwHash}&select=id,username,business_name,business_type`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();

        if (data && data.length > 0) {
          const client = data[0];
          localStorage.setItem('xypher_client_id', client.id);
          localStorage.setItem('xypher_business', client.business_name || '');
          localStorage.setItem('xypher_username', client.username);
          localStorage.setItem('xypher_token', btoa(JSON.stringify({id: client.id, ts: Date.now()})));
          window.location.href = '/dashboard.html';
        } else {
          errorBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Einloggen';
        }
      } catch (err) {
        errorBox.textContent = 'Verbindungsfehler. Bitte versuche es erneut.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Einloggen';
      }
    }
  </script>
</body>
</html>
