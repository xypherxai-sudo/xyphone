<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XYPHONE – Dashboard</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Xypher">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --primary-dark: #5b21b6;
      --bg: #07071a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(124,58,237,0.25);
      --text: rgba(240,240,255,0.9);
      --text-muted: rgba(240,240,255,0.45);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Background */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(7,7,26,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: white;
      text-decoration: none;
    }
    .logo-dot {
      width: 9px; height: 9px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(124,58,237,0.8);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .business-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--primary-light);
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 8px;
      padding: 5px 12px;
    }
    .btn-logout {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    /* Main */
    .main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(15,15,30,0.7);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(124,58,237,0.5); }
    .stat-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: white;
      line-height: 1;
    }
    .stat-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* Section heading */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: white;
    }
    .refresh-indicator {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-dot {
      width: 6px; height: 6px;
      background: #00c48c;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Calls list */
    .calls-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .call-card {
      background: rgba(15,15,30,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .call-card:hover { border-color: rgba(124,58,237,0.4); }
    .call-card.expanded { border-color: rgba(124,58,237,0.5); }

    .call-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
    }

    .call-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.2);
    }

    .call-info { flex: 1; min-width: 0; }
    .call-number {
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.2rem;
    }
    .call-summary {
      font-size: 0.82rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .call-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .call-time {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Type badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
    }
    .badge-order { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
    .badge-appointment { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .badge-inquiry { background: rgba(124,58,237,0.15); color: var(--primary-light); border: 1px solid rgba(124,58,237,0.2); }

    .expand-arrow {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .call-card.expanded .expand-arrow { transform: rotate(180deg); }

    /* Transcript */
    .call-transcript {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.2rem;
      background: rgba(0,0,0,0.2);
    }
    .call-card.expanded .call-transcript { display: block; }
    .transcript-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary-light);
      margin-bottom: 0.75rem;
    }
    .transcript-text {
      font-size: 0.85rem;
      color: rgba(240,240,255,0.65);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .transcript-details {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-title { font-size: 1.1rem; font-weight: 700; color: rgba(240,240,255,0.6); margin-bottom: 0.5rem; }
    .empty-sub { font-size: 0.88rem; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Error banner */
    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-banner.show { display: block; }

    @media (max-width: 600px) {
      .topbar { padding: 0.8rem 1rem; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .stat-value { font-size: 1.6rem; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <!-- Top Bar -->
  <nav class="topbar">
    <a href="/" class="logo">
      <div class="logo-dot"></div> XYPHONE
    </a>
    <div class="topbar-right">
      <span class="business-name" id="businessName">Laden...</span>
      <button class="btn-notify" id="btnNotify" onclick="requestPushPermission()" title="Benachrichtigungen aktivieren" style="display:none;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.35);color:#a78bfa;border-radius:10px;padding:0.45rem 0.85rem;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;">🔔 Benachrichtigungen</button>
      <button class="btn-logout" onclick="logout()">Abmelden</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Heute</div>
        <div class="stat-value" id="statToday">—</div>
        <div class="stat-sub">Anrufe</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Diese Woche</div>
        <div class="stat-value" id="statWeek">—</div>
        <div class="stat-sub">Anrufe</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Diesen Monat</div>
        <div class="stat-value" id="statMonth">—</div>
        <div class="stat-sub">Anrufe</div>
      </div>
    </div>

    <!-- Calls -->
    <div class="section-header">
      <div class="section-title">📞 Anrufe</div>
      <div class="refresh-indicator">
        <div class="refresh-dot"></div>
        <span>Aktualisiert alle 30s</span>
      </div>
    </div>

    <div class="error-banner" id="errorBanner">
      Fehler beim Laden der Anrufe. Token abgelaufen?
    </div>

    <div id="callsContainer">
      <div class="loading">⏳ Anrufe werden geladen...</div>
    </div>
  </main>

  <script>
    // Auth check
    const token = localStorage.getItem('xypher_token');
    if (!token) {
      window.location.href = '/login.html';
    }

    const businessName = localStorage.getItem('xypher_business') || 'Mein Business';
    document.getElementById('businessName').textContent = businessName;

    function logout() {
      localStorage.removeItem('xypher_token');
      localStorage.removeItem('xypher_business');
      localStorage.removeItem('xypher_username');
      window.location.href = '/login.html';
    }

    function getTypeInfo(callType) {
      const types = {
        'order': { label: 'Bestellung', emoji: '🛒', cls: 'badge-order' },
        'Bestellung': { label: 'Bestellung', emoji: '🛒', cls: 'badge-order' },
        'appointment': { label: 'Termin', emoji: '📅', cls: 'badge-appointment' },
        'Termin': { label: 'Termin', emoji: '📅', cls: 'badge-appointment' },
        'inquiry': { label: 'Anfrage', emoji: '💬', cls: 'badge-inquiry' },
        'Anfrage': { label: 'Anfrage', emoji: '💬', cls: 'badge-inquiry' },
      };
      return types[callType] || { label: 'Anfrage', emoji: '💬', cls: 'badge-inquiry' };
    }

    function formatDateTime(isoStr) {
      const d = new Date(isoStr);
      return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
        + ' · '
        + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderCalls(calls) {
      const container = document.getElementById('callsContainer');
      if (!calls || calls.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">Noch keine Anrufe</div>
            <div class="empty-sub">Sobald dein Bot Anrufe entgegennimmt, erscheinen sie hier.</div>
          </div>`;
        return;
      }

      const html = calls.map((call, i) => {
        const typeInfo = getTypeInfo(call.call_type);
        const number = call.caller_number || 'Unbekannt';
        const summary = escapeHtml(call.summary || '');
        const dateStr = call.created_at ? formatDateTime(call.created_at) : '—';
        const transcript = escapeHtml(call.transcript || 'Kein Transkript verfügbar.');
        const duration = call.duration_seconds ? `${Math.round(call.duration_seconds / 60)} Min.` : '';

        return `
          <div class="call-card" id="call-${i}" onclick="toggleCall(${i})">
            <div class="call-header">
              <div class="call-icon">${typeInfo.emoji}</div>
              <div class="call-info">
                <div class="call-number">📞 ${escapeHtml(number)}</div>
                <div class="call-summary">${summary || '<em>Keine Zusammenfassung</em>'}</div>
              </div>
              <div class="call-meta">
                <span class="badge ${typeInfo.cls}">${typeInfo.label}</span>
                <span class="call-time">${dateStr}</span>
              </div>
              <span class="expand-arrow">▼</span>
            </div>
            <div class="call-transcript">
              <div class="transcript-label">Transkript</div>
              <div class="transcript-text">${transcript}</div>
              ${duration ? `<div class="transcript-details">⏱ Dauer: ${duration}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      container.innerHTML = `<div class="calls-list">${html}</div>`;
    }

    function toggleCall(i) {
      const card = document.getElementById('call-' + i);
      card.classList.toggle('expanded');
    }

    function calcStats(calls) {
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const weekStart = new Date(todayStart);
      weekStart.setDate(todayStart.getDate() - todayStart.getDay());
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

      let today = 0, week = 0, month = 0;
      for (const c of calls) {
        const d = new Date(c.created_at);
        if (d >= todayStart) today++;
        if (d >= weekStart) week++;
        if (d >= monthStart) month++;
      }

      document.getElementById('statToday').textContent = today;
      document.getElementById('statWeek').textContent = week;
      document.getElementById('statMonth').textContent = month;
    }

    const SUPABASE_URL = 'https://llrnusfadlazswgudxjt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxscm51c2ZhZGxhenN3Z3VkeGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTY2NTMsImV4cCI6MjA5MDczMjY1M30.Ola6RkKMCqfLd05-H23f5M4VhRRJNMk_Xl8E-a-lLRo';
    const clientId = localStorage.getItem('xypher_client_id');

    async function loadCalls() {
      try {
        if (!clientId) { logout(); return; }

        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/calls?client_id=eq.${clientId}&order=created_at.desc&limit=50`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );

        if (!res.ok) throw new Error('Fehler beim Laden');

        const calls = await res.json();
        calcStats(calls);
        renderCalls(calls);
        document.getElementById('errorBanner').classList.remove('show');
      } catch (err) {
        document.getElementById('errorBanner').classList.add('show');
      }
    }

    // Initial load
    loadCalls();

    // Auto-refresh every 30s
    setInterval(loadCalls, 30000);
  </script>

  <script>
    // ─────────────────────────────────────────────────────────
    // Service Worker & Push Notifications
    // ─────────────────────────────────────────────────────────

    // ⚠️ ERSETZE diesen Schlüssel mit deinem echten VAPID Public Key!
    // Generiere einen mit: node generate-vapid-keys.js
    const VAPID_PUBLIC_KEY = 'BE3ekOOX5E9cEULJ4y3b2vNrZ-MiwoF3r3X0MRQvszwVkAMfcjgqu_itip7CWpw7UVLzFf4b4tuaBqDADrQ-1Lk';

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    async function subscribeToPush(registration) {
      try {
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });

        // Send subscription to server
        const res = await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ subscription })
        });

        if (res.ok) {
          console.log('[Push] Abonnement gespeichert ✅');
          document.getElementById('btnNotify').style.display = 'none';
        } else {
          console.warn('[Push] Server-Fehler beim Speichern');
        }
      } catch (err) {
        console.warn('[Push] Abonnement fehlgeschlagen:', err);
      }
    }

    async function requestPushPermission() {
      if (!('Notification' in window)) {
        alert('Dein Browser unterstützt keine Push-Benachrichtigungen.');
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const reg = await navigator.serviceWorker.ready;
        await subscribeToPush(reg);
      } else {
        alert('Benachrichtigungen wurden abgelehnt. Bitte erlaube sie in den Browser-Einstellungen.');
      }
    }

    async function initPWA() {
      if (!('serviceWorker' in navigator)) return;

      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        console.log('[SW] Registriert:', reg.scope);

        // Check notification permission
        if ('Notification' in window && 'PushManager' in window) {
          if (Notification.permission === 'default') {
            // Show button to request permission
            document.getElementById('btnNotify').style.display = 'inline-block';
          } else if (Notification.permission === 'granted') {
            // Already granted — ensure subscribed
            const existing = await reg.pushManager.getSubscription();
            if (!existing) {
              await subscribeToPush(reg);
            }
          }
        }
      } catch (err) {
        console.warn('[SW] Fehler:', err);
      }
    }

    // Init after token check passed
    if (token) initPWA();
  </script>
</body>
</html>
